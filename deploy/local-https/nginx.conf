server {
    listen 7861 ssl;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $ui_backend ui:7860;
    # The local LAN profile is commonly run with only backend-lmstudio-bgtts
    # active. Keep /s2s/ as a compatibility alias so saved browser settings
    # that still point at /s2s/v1/realtime continue to open a working backend.
    set $s2s_backend backend-lmstudio-bgtts:8765;
    set $s2s_bg_backend backend-lmstudio-bgtts:8765;

    ssl_certificate /certs/hf-voice-ui.crt;
    ssl_certificate_key /certs/hf-voice-ui.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://$ui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /s2s/ {
        rewrite ^/s2s/(.*)$ /$1 break;
        proxy_pass http://$s2s_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /s2s-bg/ {
        rewrite ^/s2s-bg/(.*)$ /$1 break;
        proxy_pass http://$s2s_bg_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
