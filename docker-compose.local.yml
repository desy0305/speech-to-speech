name: hf-realtime-voice-local

services:
  ui:
    build:
      context: ./apps/hf-realtime-voice-space
    environment:
      # Browser-visible default for direct mode. The browser runs on the host,
      # so localhost:8765 is correct even though the UI is in a container.
      DIRECT_S2S_URL: ${DIRECT_S2S_URL:-http://localhost:8765}
      SAME_ORIGIN_S2S_PROXY: ${SAME_ORIGIN_S2S_PROXY:-auto}
      SAME_ORIGIN_S2S_PATH: ${SAME_ORIGIN_S2S_PATH:-/s2s/v1/realtime}
      SAME_ORIGIN_BG_S2S_PATH: ${SAME_ORIGIN_BG_S2S_PATH:-/s2s-bg/v1/realtime}
      ACTIVE_BACKEND: ${ACTIVE_BACKEND:-lmstudio}
      BACKEND_LABEL: ${BACKEND_LABEL:-LM Studio (local)}
      LLM_PROVIDER: ${LLM_PROVIDER:-LM Studio}
      LLM_MODEL: ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-lmstudio}
      DEFAULT_LLM_MODEL: ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      STT_MODEL: ${STT_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
      TTS_MODEL: ${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      LLM_PROVIDERS_JSON: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio",
            "baseUrl": "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}",
            "apiKeyEnv": "LM_STUDIO_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}", "label": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}" }
            ]
          },
          {
            "id": "cerebras",
            "label": "Cerebras",
            "baseUrl": "${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}",
            "apiKeyEnv": "CEREBRAS_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${CEREBRAS_MODEL:-gemma-4-31b}", "label": "${CEREBRAS_MODEL:-gemma-4-31b}" }
            ]
          },
          {
            "id": "gemini",
            "label": "Gemini",
            "baseUrl": "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}",
            "apiKeyEnv": "GEMINI_API_KEY",
            "reasoningEffort": "low",
            "models": [
              { "id": "${GEMINI_MODEL:-gemini-3.5-flash}", "label": "${GEMINI_MODEL:-gemini-3.5-flash}" }
            ]
          },
          {
            "id": "bggpt",
            "label": "BGGPT",
            "baseUrl": "${BGGPT_URL:-https://api.bggpt.ai/v1}",
            "apiKeyEnv": "BGGPT_API_KEY",
            "models": [
              { "id": "${BGGPT_MODEL:-bggpt-gemma-3-27b}", "label": "${BGGPT_MODEL:-bggpt-gemma-3-27b}" },
              { "id": "bggpt-gemma-3-27b-fp8", "label": "bggpt-gemma-3-27b-fp8" }
            ]
          }
        ]
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-}
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BGGPT_API_KEY: ${BGGPT_API_KEY:-}
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN:-}
      MCP_ALLOWED_TOOLS: ${MCP_ALLOWED_TOOLS:-mcp-find,mcp-add,mcp-remove,mcp-exec,mcp-config-set,mcp-create-profile,mcp-activate-profile,browser_navigate,browser_snapshot,browser_console_messages,browser_network_requests,browser_network_request,browser_take_screenshot,browser_wait_for,browser_click,browser_type,browser_select_option,browser_press_key,browser_fill_form,search_nodes,open_nodes,create_entities,create_relations,add_observations,sequentialthinking}
      MCP_SERVERS_JSON: >-
        [
          { "id": "docker-toolkit", "label": "Docker MCP Toolkit", "status": "host available" },
          { "id": "playwright", "label": "Playwright browser automation", "status": "available via Docker MCP catalog" }
        ]
      BACKEND_PRESETS: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio (local)",
            "url": "http://localhost:8765",
            "llmProvider": "LM Studio",
            "llmModel": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}",
            "stt": "nvidia/parakeet-tdt-0.6b-v3",
            "tts": "Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice"
          },
          {
            "id": "lmstudio-bgtts",
            "label": "LM Studio + BG TTS (Ani)",
            "url": "http://localhost:${S2S_BG_PORT:-8766}",
            "llmProvider": "LM Studio",
            "llmModel": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}",
            "stt": "nvidia/parakeet-tdt-0.6b-v3",
            "tts": "Ani Voice API (Bulgarian)"
          },
          {
            "id": "custom",
            "label": "Custom backend URL",
            "url": "",
            "llmProvider": "Custom",
            "llmModel": "",
            "stt": "",
            "tts": ""
          }
        ]
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${UI_PORT:-7860}:7860"
    restart: unless-stopped

  ui-https:
    profiles: ["lan-https"]
    image: nginx:alpine
    depends_on:
      - ui
    volumes:
      - ./deploy/local-https/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LAN_HTTPS_CERT_DIR:-./.local-https/certs}:/certs:ro
    ports:
      - "${UI_HTTPS_PORT:-7862}:7861"
    restart: unless-stopped

  backend-lmstudio:
    profiles: ["lmstudio"]
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --tts
      - qwen3
      - --llm_backend
      - chat-completions
      - --model_name
      - ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      - --responses_api_base_url
      - ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - --responses_api_api_key
      - ${LM_STUDIO_API_KEY:-lm-studio}
      - --responses_api_reasoning_effort
      - none
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BGGPT_API_KEY: ${BGGPT_API_KEY:-}
      LLM_PROVIDERS_JSON: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio",
            "baseUrl": "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}",
            "apiKeyEnv": "LM_STUDIO_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}", "label": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}" }
            ]
          },
          {
            "id": "cerebras",
            "label": "Cerebras",
            "baseUrl": "${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}",
            "apiKeyEnv": "CEREBRAS_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${CEREBRAS_MODEL:-gemma-4-31b}", "label": "${CEREBRAS_MODEL:-gemma-4-31b}" }
            ]
          },
          {
            "id": "gemini",
            "label": "Gemini",
            "baseUrl": "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}",
            "apiKeyEnv": "GEMINI_API_KEY",
            "reasoningEffort": "low",
            "models": [
              { "id": "${GEMINI_MODEL:-gemini-3.5-flash}", "label": "${GEMINI_MODEL:-gemini-3.5-flash}" }
            ]
          },
          {
            "id": "bggpt",
            "label": "BGGPT",
            "baseUrl": "${BGGPT_URL:-https://api.bggpt.ai/v1}",
            "apiKeyEnv": "BGGPT_API_KEY",
            "models": [
              { "id": "${BGGPT_MODEL:-bggpt-gemma-3-27b}", "label": "${BGGPT_MODEL:-bggpt-gemma-3-27b}" },
              { "id": "bggpt-gemma-3-27b-fp8", "label": "bggpt-gemma-3-27b-fp8" }
            ]
          }
        ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${S2S_PORT:-8765}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  backend-cerebras:
    profiles: ["cerebras"]
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --tts
      - qwen3
      - --llm_backend
      - chat-completions
      - --model_name
      - ${CEREBRAS_MODEL:-gemma-4-31b}
      - --responses_api_base_url
      - ${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}
      - --responses_api_api_key
      - ${CEREBRAS_API_KEY:-}
      - --responses_api_reasoning_effort
      - none
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
    ports:
      - "${S2S_PORT:-8765}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  backend-hf-cerebras:
    profiles: ["hf-cerebras"]
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --tts
      - qwen3
      - --llm_backend
      - chat-completions
      - --model_name
      - ${HF_CEREBRAS_MODEL:-google/gemma-4-31B-it:cerebras}
      - --responses_api_base_url
      - https://router.huggingface.co/v1
      - --responses_api_api_key
      - ${HF_TOKEN:-}
      - --responses_api_reasoning_effort
      - none
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
    ports:
      - "${S2S_PORT:-8765}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  ani-voice-api:
    profiles: ["bgtts-ani"]
    build:
      context: ./deploy/ani-voice-api
      args:
        ANI_VOICE_REV: ${ANI_VOICE_REV:-91722a7fdd404cca1818ace44038ed43322fc66e}
    environment:
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
      HF_TOKEN: ${HF_TOKEN:-}
      ANI_VOICE_STYLE: ${ANI_VOICE_STYLE:-F5}
      ANI_VOICE_SPEED: ${ANI_VOICE_SPEED:-1.6}
      ANI_VOICE_PRELOAD: ${ANI_VOICE_PRELOAD:-true}
      ANI_VOICE_CACHE_SPEAKER: ${ANI_VOICE_CACHE_SPEAKER:-true}
      ANI_VOICE_WARMUP_TEXT: ${ANI_VOICE_WARMUP_TEXT:-Здравейте.}
      ANI_VOICE_REFERENCE_TEXT: ${ANI_VOICE_REFERENCE_TEXT:-Здравейте, радвам се да ви помогна.}
      ANI_VOICE_TIMING_LOGS: ${ANI_VOICE_TIMING_LOGS:-true}
    ports:
      - "${ANI_VOICE_PORT:-8001}:8000/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    restart: unless-stopped

  backend-lmstudio-bgtts:
    profiles: ["bgtts-ani"]
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --tts
      - ani-voice
      - --ani_voice_api_url
      - ${ANI_VOICE_API_URL:-http://ani-voice-api:8000}
      - --ani_voice_style
      - ${ANI_VOICE_STYLE:-F5}
      - --ani_voice_speed
      - ${ANI_VOICE_SPEED:-1.6}
      - --ani_voice_timeout_s
      - ${ANI_VOICE_TIMEOUT_S:-120}
      - --ani_voice_blocksize
      - ${ANI_VOICE_BLOCKSIZE:-512}
      - --llm_backend
      - chat-completions
      - --model_name
      - ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      - --responses_api_base_url
      - ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - --responses_api_api_key
      - ${LM_STUDIO_API_KEY:-lm-studio}
      - --responses_api_reasoning_effort
      - none
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BGGPT_API_KEY: ${BGGPT_API_KEY:-}
      LLM_PROVIDERS_JSON: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio",
            "baseUrl": "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}",
            "apiKeyEnv": "LM_STUDIO_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}", "label": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}" }
            ]
          },
          {
            "id": "cerebras",
            "label": "Cerebras",
            "baseUrl": "${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}",
            "apiKeyEnv": "CEREBRAS_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${CEREBRAS_MODEL:-gemma-4-31b}", "label": "${CEREBRAS_MODEL:-gemma-4-31b}" }
            ]
          },
          {
            "id": "gemini",
            "label": "Gemini",
            "baseUrl": "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}",
            "apiKeyEnv": "GEMINI_API_KEY",
            "reasoningEffort": "low",
            "models": [
              { "id": "${GEMINI_MODEL:-gemini-3.5-flash}", "label": "${GEMINI_MODEL:-gemini-3.5-flash}" }
            ]
          },
          {
            "id": "bggpt",
            "label": "BGGPT",
            "baseUrl": "${BGGPT_URL:-https://api.bggpt.ai/v1}",
            "apiKeyEnv": "BGGPT_API_KEY",
            "models": [
              { "id": "${BGGPT_MODEL:-bggpt-gemma-3-27b}", "label": "${BGGPT_MODEL:-bggpt-gemma-3-27b}" },
              { "id": "bggpt-gemma-3-27b-fp8", "label": "bggpt-gemma-3-27b-fp8" }
            ]
          }
        ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${S2S_BG_PORT:-8766}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    depends_on:
      ani-voice-api:
        condition: service_healthy
    gpus: all
    restart: unless-stopped
