name: hf-realtime-voice-local

services:
  ui:
    image: ${S2S_UI_IMAGE:-hf-realtime-voice-local-ui:latest}
    build:
      context: ./apps/hf-realtime-voice-space
    environment:
      # Browser-visible default for direct mode. The browser runs on the host,
      # so localhost:8765 is correct even though the UI is in a container.
      DIRECT_S2S_URL: ${DIRECT_S2S_URL:-http://localhost:8765}
      SAME_ORIGIN_S2S_PROXY: ${SAME_ORIGIN_S2S_PROXY:-auto}
      SAME_ORIGIN_S2S_PATH: ${SAME_ORIGIN_S2S_PATH:-/s2s/v1/realtime}
      SAME_ORIGIN_BG_S2S_PATH: ${SAME_ORIGIN_BG_S2S_PATH:-/s2s-bg/v1/realtime}
      ACTIVE_BACKEND: ${ACTIVE_BACKEND:-lmstudio}
      BACKEND_LABEL: ${BACKEND_LABEL:-LM Studio (local)}
      LLM_PROVIDER: ${LLM_PROVIDER:-LM Studio}
      LLM_MODEL: ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-lmstudio}
      DEFAULT_LLM_MODEL: ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      STT_MODEL: ${STT_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
      TTS_MODEL: ${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      LLM_PROVIDERS_JSON: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio",
            "baseUrl": "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}",
            "apiKeyEnv": "LM_STUDIO_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}", "label": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}" }
            ]
          },
          {
            "id": "cerebras",
            "label": "Cerebras",
            "baseUrl": "${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}",
            "apiKeyEnv": "CEREBRAS_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${CEREBRAS_MODEL:-gemma-4-31b}", "label": "${CEREBRAS_MODEL:-gemma-4-31b}" }
            ]
          },
          {
            "id": "gemini",
            "label": "Gemini",
            "baseUrl": "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}",
            "apiKeyEnv": "GEMINI_API_KEY",
            "reasoningEffort": "low",
            "models": [
              { "id": "${GEMINI_MODEL:-gemini-3.5-flash}", "label": "${GEMINI_MODEL:-gemini-3.5-flash}" }
            ]
          },
          {
            "id": "bggpt",
            "label": "BGGPT",
            "baseUrl": "${BGGPT_URL:-https://api.bggpt.ai/v1}",
            "apiKeyEnv": "BGGPT_API_KEY",
            "models": [
              { "id": "${BGGPT_MODEL:-bggpt-gemma-3-27b}", "label": "${BGGPT_MODEL:-bggpt-gemma-3-27b}" },
              { "id": "bggpt-gemma-3-27b-fp8", "label": "bggpt-gemma-3-27b-fp8" }
            ]
          }
        ]
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-}
      UI_HTTPS_AUTH_ENABLED: ${UI_HTTPS_AUTH_ENABLED:-}
      UI_HTTPS_AUTH_USER: ${UI_HTTPS_AUTH_USER:-}
      UI_HTTPS_AUTH_PASSWORD: ${UI_HTTPS_AUTH_PASSWORD:-}
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-}
      QWEN_OMNI_BASE_URL: ${QWEN_OMNI_BASE_URL:-}
      QWEN_OMNI_MODEL: ${QWEN_OMNI_MODEL:-ggml-org/Qwen3-Omni-30B-A3B-Instruct-GGUF}
      QWEN_OMNI_API_KEY: ${QWEN_OMNI_API_KEY:-}
      QWEN_OMNI_REQUIRE_LOCAL: ${QWEN_OMNI_REQUIRE_LOCAL:-1}
      VISION_OBSERVER_ENABLED: ${VISION_OBSERVER_ENABLED:-1}
      SMOLVLM_BASE_URL: ${SMOLVLM_BASE_URL:-http://smolvlm:8080}
      SMOLVLM_MODEL: ${SMOLVLM_MODEL:-ggml-org/SmolVLM-500M-Instruct-GGUF}
      SMOLVLM_API_KEY: ${SMOLVLM_API_KEY:-}
      SMOLVLM_REQUIRE_LOCAL: ${SMOLVLM_REQUIRE_LOCAL:-1}
      VISION_OBSERVER_INTERVAL_MS: ${VISION_OBSERVER_INTERVAL_MS:-2000}
      VISION_OBSERVER_MAX_CONTEXT_CHARS: ${VISION_OBSERVER_MAX_CONTEXT_CHARS:-1200}
      WAKE_WORD_ENABLED: ${WAKE_WORD_ENABLED:-0}
      WAKE_WORD_BASE_URL: ${WAKE_WORD_BASE_URL:-http://wake-word:8081}
      WAKE_WORD_PHRASE: ${WAKE_WORD_PHRASE:-HEY EVA}
      WAKE_WORD_FOLLOWUP_S: ${WAKE_WORD_FOLLOWUP_S:-20}
      WAKE_WORD_SCORE: ${WAKE_WORD_SCORE:-2.0}
      WAKE_WORD_THRESHOLD: ${WAKE_WORD_THRESHOLD:-0.15}
      WAKE_WORD_REQUIRE_LOCAL: ${WAKE_WORD_REQUIRE_LOCAL:-1}
      OFFICE_AGENT_ENABLED: ${OFFICE_AGENT_ENABLED:-0}
      OFFICE_AGENT_BASE_URL: ${OFFICE_AGENT_BASE_URL:-http://office-agent:8082}
      OFFICE_AGENT_TOKEN: ${OFFICE_AGENT_TOKEN:-}
      OFFICE_AGENT_REQUIRE_LOCAL: ${OFFICE_AGENT_REQUIRE_LOCAL:-1}
      OFFICE_AGENT_REQUIRE_LOCAL_LLM: ${OFFICE_AGENT_REQUIRE_LOCAL_LLM:-1}
      OFFICE_AGENT_LOCAL_LLM_PROVIDERS: ${OFFICE_AGENT_LOCAL_LLM_PROVIDERS:-lmstudio}
      OFFICE_AGENT_TIMEOUT_S: ${OFFICE_AGENT_TIMEOUT_S:-35}
      OFFICE_AGENT_MAX_RESPONSE_BYTES: ${OFFICE_AGENT_MAX_RESPONSE_BYTES:-1048576}
      OFFICE_AGENT_MAX_ARTIFACT_BYTES: ${OFFICE_AGENT_MAX_ARTIFACT_BYTES:-15728640}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BGGPT_API_KEY: ${BGGPT_API_KEY:-}
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN:-}
      MCP_ALLOWED_TOOLS: ${MCP_ALLOWED_TOOLS:-mcp-find,mcp-add,mcp-remove,mcp-exec,mcp-config-set,mcp-create-profile,mcp-activate-profile,browser_navigate,browser_snapshot,browser_console_messages,browser_network_requests,browser_network_request,browser_take_screenshot,browser_wait_for,browser_click,browser_type,browser_select_option,browser_press_key,browser_fill_form,search_nodes,open_nodes,create_entities,create_relations,add_observations,sequentialthinking}
      MCP_SERVERS_JSON: >-
        [
          { "id": "docker-toolkit", "label": "Docker MCP Toolkit", "status": "host available" },
          { "id": "playwright", "label": "Playwright browser automation", "status": "available via Docker MCP catalog" }
        ]
      BACKEND_PRESETS: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio (local)",
            "url": "http://localhost:8765",
            "llmProvider": "LM Studio",
            "llmModel": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}",
            "stt": "nvidia/parakeet-tdt-0.6b-v3",
            "tts": "Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice",
            "healthUrl": "http://backend-lmstudio:8765/v1/pool"
          },
          {
            "id": "lmstudio-bgtts",
            "label": "LM Studio + BG TTS (Ani)",
            "url": "http://localhost:${S2S_BG_PORT:-8766}",
            "llmProvider": "LM Studio",
            "llmModel": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}",
            "stt": "nvidia/parakeet-tdt-0.6b-v3",
            "tts": "Ani Voice API (Bulgarian)",
            "healthUrl": "http://backend-lmstudio-bgtts:8765/v1/pool"
          },
          {
            "id": "custom",
            "label": "Custom backend URL",
            "url": "",
            "llmProvider": "Custom",
            "llmModel": "",
            "stt": "",
            "tts": ""
          }
        ]
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${UI_PORT:-7860}:7860"
    networks:
      - default
      - agent-internal
    restart: unless-stopped

  ui-https:
    profiles: ["lan-https"]
    image: nginx:alpine
    depends_on:
      - ui
    volumes:
      - ./deploy/local-https/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LAN_HTTPS_CERT_DIR:-./.local-https/certs}:/certs:ro
    ports:
      - "${UI_HTTPS_PORT:-50056}:7861"
    restart: unless-stopped

  smolvlm:
    profiles: ["vision-observer"]
    image: ${SMOLVLM_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    command:
      - -hf
      - ${SMOLVLM_HF_REPO:-ggml-org/SmolVLM-500M-Instruct-GGUF}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - ${SMOLVLM_CTX_SIZE:-4096}
      - -ngl
      - ${SMOLVLM_N_GPU_LAYERS:-99}
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
    ports:
      - "${SMOLVLM_PORT:-8080}:8080/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  backend-lmstudio:
    profiles: ["lmstudio", "bgtts-ani"]
    image: ${S2S_BACKEND_IMAGE:-hf-realtime-voice-local-backend:latest}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --parakeet_tdt_model_name
      - ${PARAKEET_TDT_MODEL_NAME:-nvidia/parakeet-tdt-0.6b-v3}
      - --tts
      - qwen3
      - --qwen3_tts_max_new_tokens
      - ${QWEN3_TTS_MAX_NEW_TOKENS:-3072}
      - --llm_backend
      - chat-completions
      - --model_name
      - ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      - --responses_api_base_url
      - ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - --responses_api_api_key
      - ${LM_STUDIO_API_KEY:-}
      - --responses_api_reasoning_effort
      - none
      - --chat_size
      - ${S2S_CHAT_SIZE:-60}
      - --request_timeout_s
      - ${S2S_LLM_REQUEST_TIMEOUT_S:-120}
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      TZ: ${TZ:-Europe/Sofia}
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BGGPT_API_KEY: ${BGGPT_API_KEY:-}
      LLM_PROVIDERS_JSON: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio",
            "baseUrl": "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}",
            "apiKeyEnv": "LM_STUDIO_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}", "label": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}" }
            ]
          },
          {
            "id": "cerebras",
            "label": "Cerebras",
            "baseUrl": "${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}",
            "apiKeyEnv": "CEREBRAS_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${CEREBRAS_MODEL:-gemma-4-31b}", "label": "${CEREBRAS_MODEL:-gemma-4-31b}" }
            ]
          },
          {
            "id": "gemini",
            "label": "Gemini",
            "baseUrl": "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}",
            "apiKeyEnv": "GEMINI_API_KEY",
            "reasoningEffort": "low",
            "models": [
              { "id": "${GEMINI_MODEL:-gemini-3.5-flash}", "label": "${GEMINI_MODEL:-gemini-3.5-flash}" }
            ]
          },
          {
            "id": "bggpt",
            "label": "BGGPT",
            "baseUrl": "${BGGPT_URL:-https://api.bggpt.ai/v1}",
            "apiKeyEnv": "BGGPT_API_KEY",
            "models": [
              { "id": "${BGGPT_MODEL:-bggpt-gemma-3-27b}", "label": "${BGGPT_MODEL:-bggpt-gemma-3-27b}" },
              { "id": "bggpt-gemma-3-27b-fp8", "label": "bggpt-gemma-3-27b-fp8" }
            ]
          }
        ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${S2S_PORT:-8765}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  backend-cerebras:
    profiles: ["cerebras"]
    image: ${S2S_BACKEND_IMAGE:-hf-realtime-voice-local-backend:latest}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --parakeet_tdt_model_name
      - ${PARAKEET_TDT_MODEL_NAME:-nvidia/parakeet-tdt-0.6b-v3}
      - --tts
      - qwen3
      - --qwen3_tts_max_new_tokens
      - ${QWEN3_TTS_MAX_NEW_TOKENS:-3072}
      - --llm_backend
      - chat-completions
      - --model_name
      - ${CEREBRAS_MODEL:-gemma-4-31b}
      - --responses_api_base_url
      - ${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}
      - --responses_api_api_key
      - ${CEREBRAS_API_KEY:-}
      - --responses_api_reasoning_effort
      - none
      - --chat_size
      - ${S2S_CHAT_SIZE:-60}
      - --request_timeout_s
      - ${S2S_LLM_REQUEST_TIMEOUT_S:-120}
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      TZ: ${TZ:-Europe/Sofia}
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
    ports:
      - "${S2S_PORT:-8765}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  backend-hf-cerebras:
    profiles: ["hf-cerebras"]
    image: ${S2S_BACKEND_IMAGE:-hf-realtime-voice-local-backend:latest}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --parakeet_tdt_model_name
      - ${PARAKEET_TDT_MODEL_NAME:-nvidia/parakeet-tdt-0.6b-v3}
      - --tts
      - qwen3
      - --qwen3_tts_max_new_tokens
      - ${QWEN3_TTS_MAX_NEW_TOKENS:-3072}
      - --llm_backend
      - chat-completions
      - --model_name
      - ${HF_CEREBRAS_MODEL:-google/gemma-4-31B-it:cerebras}
      - --responses_api_base_url
      - https://router.huggingface.co/v1
      - --responses_api_api_key
      - ${HF_TOKEN:-}
      - --responses_api_reasoning_effort
      - none
      - --chat_size
      - ${S2S_CHAT_SIZE:-60}
      - --request_timeout_s
      - ${S2S_LLM_REQUEST_TIMEOUT_S:-120}
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      TZ: ${TZ:-Europe/Sofia}
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
    ports:
      - "${S2S_PORT:-8765}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    restart: unless-stopped

  ani-voice-api:
    profiles: ["bgtts-ani"]
    image: ${ANI_VOICE_IMAGE:-hf-realtime-voice-local-ani-voice-api:latest}
    build:
      context: ./deploy/ani-voice-api
      args:
        ANI_VOICE_REV: ${ANI_VOICE_REV:-91722a7fdd404cca1818ace44038ed43322fc66e}
    environment:
      TZ: ${TZ:-Europe/Sofia}
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
      HF_TOKEN: ${HF_TOKEN:-}
      ANI_VOICE_STYLE: ${ANI_VOICE_STYLE:-F5}
      ANI_VOICE_SPEED: ${ANI_VOICE_SPEED:-1.6}
      ANI_VOICE_PRELOAD: ${ANI_VOICE_PRELOAD:-true}
      ANI_VOICE_CACHE_SPEAKER: ${ANI_VOICE_CACHE_SPEAKER:-true}
      ANI_VOICE_MAX_TOKENS: ${ANI_VOICE_MAX_TOKENS:-1024}
      ANI_VOICE_WARMUP_TEXT: ${ANI_VOICE_WARMUP_TEXT:-Здравейте.}
      ANI_VOICE_REFERENCE_TEXT: ${ANI_VOICE_REFERENCE_TEXT:-Здравейте, радвам се да ви помогна.}
      ANI_VOICE_TIMING_LOGS: ${ANI_VOICE_TIMING_LOGS:-true}
    ports:
      - "${ANI_VOICE_PORT:-8001}:8000/tcp"
    volumes:
      - ./cache:/root/.cache
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    restart: unless-stopped

  backend-lmstudio-bgtts:
    profiles: ["bgtts-ani"]
    image: ${S2S_BACKEND_IMAGE:-hf-realtime-voice-local-backend:latest}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    command:
      - speech-to-speech
      - --mode
      - realtime
      - --ws_host
      - 0.0.0.0
      - --ws_port
      - "8765"
      - --stt
      - parakeet-tdt
      - --parakeet_tdt_model_name
      - ${PARAKEET_TDT_MODEL_NAME:-nvidia/parakeet-tdt-0.6b-v3}
      - --parakeet_tdt_language
      - ${S2S_BG_STT_LANGUAGE:-bg}
      - --tts
      - ani-voice
      - --ani_voice_api_url
      - ${ANI_VOICE_API_URL:-http://ani-voice-api:8000}
      - --ani_voice_style
      - ${ANI_VOICE_STYLE:-F5}
      - --ani_voice_speed
      - ${ANI_VOICE_SPEED:-1.6}
      - --ani_voice_timeout_s
      - ${ANI_VOICE_TIMEOUT_S:-120}
      - --ani_voice_blocksize
      - ${ANI_VOICE_BLOCKSIZE:-512}
      - --llm_backend
      - chat-completions
      - --model_name
      - ${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}
      - --responses_api_base_url
      - ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - --responses_api_api_key
      - ${LM_STUDIO_API_KEY:-}
      - --responses_api_reasoning_effort
      - none
      - --chat_size
      - ${S2S_CHAT_SIZE:-60}
      - --request_timeout_s
      - ${S2S_LLM_REQUEST_TIMEOUT_S:-120}
      - --enable_lang_prompt
      - --init_chat_prompt
      - ${S2S_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep replies short, warm, and spoken.}
    environment:
      TZ: ${TZ:-Europe/Sofia}
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BGGPT_API_KEY: ${BGGPT_API_KEY:-}
      LLM_PROVIDERS_JSON: >-
        [
          {
            "id": "lmstudio",
            "label": "LM Studio",
            "baseUrl": "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}",
            "apiKeyEnv": "LM_STUDIO_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}", "label": "${LM_STUDIO_MODEL:-google/gemma-4-12b-qat}" }
            ]
          },
          {
            "id": "cerebras",
            "label": "Cerebras",
            "baseUrl": "${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}",
            "apiKeyEnv": "CEREBRAS_API_KEY",
            "reasoningEffort": "none",
            "models": [
              { "id": "${CEREBRAS_MODEL:-gemma-4-31b}", "label": "${CEREBRAS_MODEL:-gemma-4-31b}" }
            ]
          },
          {
            "id": "gemini",
            "label": "Gemini",
            "baseUrl": "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}",
            "apiKeyEnv": "GEMINI_API_KEY",
            "reasoningEffort": "low",
            "models": [
              { "id": "${GEMINI_MODEL:-gemini-3.5-flash}", "label": "${GEMINI_MODEL:-gemini-3.5-flash}" }
            ]
          },
          {
            "id": "bggpt",
            "label": "BGGPT",
            "baseUrl": "${BGGPT_URL:-https://api.bggpt.ai/v1}",
            "apiKeyEnv": "BGGPT_API_KEY",
            "models": [
              { "id": "${BGGPT_MODEL:-bggpt-gemma-3-27b}", "label": "${BGGPT_MODEL:-bggpt-gemma-3-27b}" },
              { "id": "bggpt-gemma-3-27b-fp8", "label": "bggpt-gemma-3-27b-fp8" }
            ]
          }
        ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${S2S_BG_PORT:-8766}:8765/tcp"
    volumes:
      - ./cache:/root/.cache
    depends_on:
      ani-voice-api:
        condition: service_healthy
    gpus: all
    restart: unless-stopped

  wake-word:
    profiles: ["wake-word"]
    image: ${WAKE_WORD_IMAGE:-hf-realtime-voice-wake-word:1.13.4}
    build:
      context: ./deploy/wake-word
      args:
        MODEL_URL: ${WAKE_WORD_MODEL_URL:-https://github.com/k2-fsa/sherpa-onnx/releases/download/kws-models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01.tar.bz2}
        MODEL_SHA256: ${WAKE_WORD_MODEL_SHA256:-f170013b4716e41b62b9bfd809687c207cef798ef9bc6534d524e17af9b6561a}
    environment:
      WAKE_WORD_PHRASE: ${WAKE_WORD_PHRASE:-HEY EVA}
      WAKE_WORD_SCORE: ${WAKE_WORD_SCORE:-2.0}
      WAKE_WORD_THRESHOLD: ${WAKE_WORD_THRESHOLD:-0.15}
      WAKE_WORD_NUM_THREADS: ${WAKE_WORD_NUM_THREADS:-1}
    user: "10001:10001"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    pids_limit: 64
    cpus: 1.0
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=3))['ready']"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agent-internal
    restart: unless-stopped

  office-agent:
    profiles: ["office-agent"]
    image: ${OFFICE_AGENT_IMAGE:-hf-realtime-voice-office-agent:1.0.135}
    build:
      context: ./deploy/office-agent
      args:
        OFFICECLI_VERSION: ${OFFICECLI_VERSION:-1.0.135}
        CHECKSUMS_SHA256: ${OFFICECLI_SHA256SUMS_SHA256:-9a991e1db05c6c6896c6747c76d833735f0b907648cb1a416f80f1840999a3d5}
        OFFICECLI_AMD64_SHA256: ${OFFICECLI_LINUX_X64_SHA256:-00028af3db48678fc9ff6c8f9e70fa4c150dcee2b43ed85254afc8f4a48e13eb}
        OFFICECLI_ARM64_SHA256: ${OFFICECLI_LINUX_ARM64_SHA256:-2ec0d5a455646647f798f723e62fd9c18e2e801f8460d4401d2554a6a1c6d5b0}
    environment:
      OFFICECLI_SKIP_UPDATE: "1"
      OFFICE_AGENT_TOKEN: ${OFFICE_AGENT_TOKEN:-}
      OFFICE_AGENT_TIMEOUT_S: ${OFFICE_AGENT_TIMEOUT_S:-30}
      OFFICE_AGENT_INTENT_TTL_S: ${OFFICE_AGENT_INTENT_TTL_S:-60}
      OFFICE_AGENT_MAX_OUTPUT_BYTES: ${OFFICE_AGENT_MAX_OUTPUT_BYTES:-65536}
      OFFICE_AGENT_MAX_ARTIFACT_BYTES: ${OFFICE_AGENT_MAX_ARTIFACT_BYTES:-15728640}
    user: "10001:10001"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=256m
      - /dev/shm:rw,nosuid,nodev,size=256m
    pids_limit: 128
    cpus: 2.0
    mem_limit: 2g
    volumes:
      - ${OFFICE_AGENT_WORKSPACE:-./agent-workspace}:/workspace:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8082/health', timeout=3))['ready']"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agent-internal
    restart: unless-stopped

networks:
  agent-internal:
    internal: true
