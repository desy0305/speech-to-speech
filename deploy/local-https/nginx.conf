limit_req_zone $binary_remote_addr zone=ui_per_ip:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ws_per_ip:10m rate=5r/s;

log_format hf_voice_min '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                        '$status $body_bytes_sent "$http_user_agent"';

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 7861 ssl;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    server_tokens off;
    client_max_body_size 8m;
    limit_req_status 429;
    access_log /var/log/nginx/access.log hf_voice_min;

    set $ui_backend ui:7860;
    set $s2s_backend backend-lmstudio:8765;
    set $s2s_bg_backend backend-lmstudio-bgtts:8765;

    ssl_certificate /certs/hf-voice-ui.crt;
    ssl_certificate_key /certs/hf-voice-ui.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(), usb=(), serial=()" always;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location = /api/edge-auth {
        internal;
        proxy_pass http://$ui_backend/api/edge-auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location @edge_auth_required {
        add_header WWW-Authenticate $edge_auth_header always;
        return 401;
    }

    location ~* (^|/)(\.env|\.git|\.svn|\.hg|docker-compose[^/]*\.ya?ml|compose[^/]*\.ya?ml|id_rsa|id_dsa|.*\.(?:key|pem|p12|pfx|crt|csr|env|ini|log|bak|backup|sql|sqlite|db))$ {
        return 404;
    }

    location / {
        auth_request /api/edge-auth;
        auth_request_set $edge_auth_header $upstream_http_www_authenticate;
        error_page 401 = @edge_auth_required;
        limit_req zone=ui_per_ip burst=120 nodelay;
        proxy_pass http://$ui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /api/ {
        auth_request /api/edge-auth;
        auth_request_set $edge_auth_header $upstream_http_www_authenticate;
        error_page 401 = @edge_auth_required;
        limit_req zone=api_per_ip burst=40 nodelay;
        proxy_pass http://$ui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /s2s/ {
        auth_request /api/edge-auth;
        auth_request_set $edge_auth_header $upstream_http_www_authenticate;
        error_page 401 = @edge_auth_required;
        limit_req zone=ws_per_ip burst=20 nodelay;
        rewrite ^/s2s/(.*)$ /$1 break;
        proxy_pass http://$s2s_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /s2s-bg/ {
        auth_request /api/edge-auth;
        auth_request_set $edge_auth_header $upstream_http_www_authenticate;
        error_page 401 = @edge_auth_required;
        limit_req zone=ws_per_ip burst=20 nodelay;
        rewrite ^/s2s-bg/(.*)$ /$1 break;
        proxy_pass http://$s2s_bg_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
